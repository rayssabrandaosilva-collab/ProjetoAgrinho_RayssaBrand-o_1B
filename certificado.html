<script>



let nome = localStorage.getItem("nomeUsuario");
let pontos = Number(localStorage.getItem("pontuacao"));

document.getElementById("nome").innerHTML = nome;

document.getElementById("pontos").innerHTML =
pontos + " de 25 acertos";

document.getElementById("data").innerHTML =
new Date().toLocaleDateString("pt-BR");



if(pontos < 15){

if(pontos < 15){


document.body.innerHTML = `

<div class="caixa-erro">

</div>

`;

}



async function baixarPDF(){



const elemento = document.getElementById("certificado");



const canvas = await html2canvas(elemento,{

scale:3

});



const imagem = canvas.toDataURL("image/png");



const {jsPDF}=window.jspdf;



const pdf = new jsPDF({


orientation:"landscape",

unit:"px",

format:[1100,750]


});




pdf.addImage(

imagem,

"PNG",

0,

0,

1100,

750

);




pdf.save("Certificado_Futuro_Sustentavel.pdf");



}

</script>
